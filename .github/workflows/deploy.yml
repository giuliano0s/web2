name: Deploy Locaweb

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # gera o conexao.php de producao a partir dos secrets
      - name: Monta o conexao.php de producao
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
        run: |
          cat > conexao.php <<PHP
          <?php

          // credenciais do banco
          \$host  = '$DB_HOST';
          \$banco = '$DB_NAME';
          \$usuario = '$DB_USER';
          \$senha = '$DB_PASS';

          // conexao PDO com utf8mb4
          \$dsn = "mysql:host=\$host;dbname=\$banco;charset=utf8mb4";
          \$conexao = new PDO(\$dsn, \$usuario, \$senha);
          \$conexao->setAttribute(PDO::ATTR_ERRMODE, PDO::ERRMODE_EXCEPTION);
          \$conexao->setAttribute(PDO::ATTR_DEFAULT_FETCH_MODE, PDO::FETCH_ASSOC);
          PHP

      # reune na pasta dist apenas o que vai para o servidor
      - name: Prepara a pasta de deploy
        run: |
          mkdir dist
          cp -r factory.php conexao.php index.php util models controllers views dist/

      - name: FTP Deploy Locaweb
        uses: locaweb/ftp-deploy@1.0.0
        with:
          host: ${{ secrets.FTP_HOST }}
          user: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          localDir: "dist"
          remoteDir: "public_html"
